<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RUN my hamter</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: "Press Start 2P", cursive;
      background:
        radial-gradient(circle at top, rgba(255, 214, 231, 0.92), rgba(255, 179, 209, 0.84) 38%, rgba(224, 85, 154, 0.92) 100%),
        linear-gradient(180deg, #ffd6e7 0%, #ffb3d1 100%);
      color: #fff5f9;
    }

    body {
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .shell {
      position: relative;
      width: min(1180px, 96vw);
      height: min(760px, 92vh);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 26px 0 rgba(224, 85, 154, 0.22),
        0 34px 64px rgba(120, 32, 72, 0.34),
        inset 0 0 0 4px rgba(255, 245, 249, 0.34);
      background: #fff5f9;
      touch-action: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 720px) {
      .shell {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="shell">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script>
    const LEVELS = [
      {
        theme: "🌻 Girasoles",
        collectSprites: ["sunflower", "seed"],
        obstacleType: "vaina",
        pointsNeeded: 20,
        reward: "¡Conseguiste flores! 🌸"
      },
      {
        theme: "🍬 Golosinas",
        collectSprites: ["cinamon", "dorito"],
        obstacleType: "star",
        pointsNeeded: 25,
        reward: "¡Conseguiste golosinas! 🍬"
      },
      {
        theme: "🌨️ Piito",
        collectSprites: ["feather", "note"],
        obstacleType: "snowball",
        pointsNeeded: 30,
        reward: "¡Elige tu regalo! 🎁",
        isFinal: true
      }
    ];

    const DECO_SPRITE_FILES = [
      "deco_cosmo.png",
      "deco_daffodil.png",
      "deco_daisy.png",
      "deco_lavender.png",
      "deco_lilyvalley.png",
      "deco_lily.png",
      "deco_orchid.png",
      "deco_pansy.png",
      "deco_poppy.png",
      "deco_rose.png",
      "deco_sunflower.png",
      "deco_tulip.png"
    ];

    const BACKGROUND_LAYER_COUNTS = [7, 9, 9];
    const ANIMATED_SPRITE_FRAMES = {
      hamster: 10,
      star: 14,
      feather: 8,
      note: 4
    };
    const STATIC_SPRITE_SIZES = {
      sunflower: 48,
      seed: 48,
      cinamon: 48,
      dorito: 48,
      chili: 48,
      cola: 48,
      snowball: 40
    };
    const VAINA_ASPECT_RATIO = 388 / 1056;
    const FRAME_SIZE = 32;
    const PINK_LIGHT = "#FFD6E7";
    const PINK_MID = "#FFB3D1";
    const PINK_DARK = "#FF80B5";
    const PINK_DEEP = "#E0559A";
    const CREAM = "#FFF5F9";
    const PURPLE_SOFT = "#623774";
    const YELLOW_SOFT = "#FFE8A3";
    const SHADOW = "rgba(180, 60, 120, 0.25)";
    const UI_CONFETTI_COLORS = [PINK_LIGHT, PINK_MID, PINK_DARK, PURPLE_SOFT, YELLOW_SOFT, CREAM];
    const GIFT_TEXT_TOCADISCOS = "Texto pendiente para el tocadiscos. Aqui va el mensaje final que quieras dejar para este regalo.";
    const GIFT_TEXT_PARKA = "Texto pendiente para la parka. Aqui va el mensaje final que quieras dejar para este regalo.";
    const GIFT_TEXT_GENERAL = "Gracias por jugar y llegar hasta aqui. Este espacio queda listo para completar el cierre con tus fotos y tu mensaje final.";
    const AudioManager = {
      tracks: {},
      current: null,
      muted: false,
      volume: 0.7,
      fadeInterval: null,
      clearFade() {
        if (this.fadeInterval) {
          clearInterval(this.fadeInterval);
          this.fadeInterval = null;
        }
      },
      fadeVolume(key, targetVolume, options = {}) {
        const track = this.tracks[key];
        const onComplete = options.onComplete || null;
        const pauseOnEnd = options.pauseOnEnd ?? false;
        if (!track) {
          if (onComplete) {
            onComplete();
          }
          return;
        }

        this.clearFade();
        const steps = Math.max(1, Math.round(800 / 50));
        const startVolume = track.volume;
        const delta = (targetVolume - startVolume) / steps;
        let step = 0;

        this.fadeInterval = setInterval(() => {
          step += 1;
          const nextVolume = step >= steps ? targetVolume : startVolume + delta * step;
          track.volume = Math.max(0, Math.min(1, nextVolume));

          if (step >= steps) {
            this.clearFade();
            if (pauseOnEnd) {
              track.pause();
            }
            if (onComplete) {
              onComplete();
            }
          }
        }, 50);
      },
      fadeOut(key, cb) {
        const track = this.tracks[key];
        if (!track) {
          if (cb) {
            cb();
          }
          return;
        }

        if (track.paused || track.volume <= 0) {
          track.volume = 0;
          track.pause();
          if (cb) {
            cb();
          }
          return;
        }

        this.fadeVolume(key, 0, {
          pauseOnEnd: true,
          onComplete: cb
        });
      },
      fadeIn(key) {
        const track = this.tracks[key];
        if (!track) {
          return;
        }

        this.clearFade();
        track.volume = 0;
        track.currentTime = 0;
        const playPromise = track.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }

        this.fadeVolume(key, this.muted ? 0 : this.volume);
      },
      play(key) {
        const track = this.tracks[key];
        if (!track) {
          return;
        }

        if (this.current === key) {
          if (track.paused) {
            this.fadeIn(key);
          } else if (!this.muted && track.volume < this.volume) {
            this.fadeVolume(key, this.volume);
          }
          return;
        }

        const previous = this.current;
        this.current = key;

        if (!previous) {
          this.fadeIn(key);
          return;
        }

        this.fadeOut(previous, () => {
          this.fadeIn(key);
        });
      },
      toggleMute() {
        this.muted = !this.muted;

        if (this.muted) {
          Object.keys(this.tracks).forEach((key) => {
            const track = this.tracks[key];
            if (!track.paused) {
              this.fadeVolume(key, 0);
            }
          });
          return;
        }

        if (this.current && this.tracks[this.current] && !this.tracks[this.current].paused) {
          this.fadeVolume(this.current, this.volume);
        }
      }
    };

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const shell = document.getElementById("shell");

    const sprites = {
      sunflower: new Image(),
      seed: new Image(),
      cinamon: new Image(),
      dorito: new Image(),
      chili: new Image(),
      cola: new Image(),
      snowball: new Image(),
      vaina: new Image(),
      hamster: new Image(),
      star: new Image(),
      feather: new Image(),
      note: new Image(),
      deco: DECO_SPRITE_FILES.map(() => new Image())
    };
    const bgLayers = BACKGROUND_LAYER_COUNTS.map((count) => Array.from({ length: count }, () => new Image()));
    const photos = Array.from({ length: 4 }, () => new Image());

    ["music_intro", "music_level2", "music_level3", "music_final", "music_gameover"].forEach((key) => {
      const track = new Audio(`audio/${key}.mp3`);
      track.loop = key !== "music_gameover";
      track.volume = 0;
      track.preload = "auto";
      AudioManager.tracks[key] = track;
    });

    let totalAssets = 0;
    let loadedAssets = 0;
    let booted = false;

    function pixelText(context, text, x, y, size, color, options = {}) {
      const lines = String(text).split("\n");
      const lineHeight = options.lineHeight || Math.round(size * 1.65);
      const totalHeight = lineHeight * (lines.length - 1);

      context.save();
      context.imageSmoothingEnabled = false;
      context.font = `${size}px "Press Start 2P", cursive`;
      context.textAlign = options.align || "center";
      context.textBaseline = options.baseline || "middle";

      lines.forEach((line, index) => {
        const lineY = y + index * lineHeight - totalHeight / 2;

        if (options.shadowColor) {
          context.fillStyle = options.shadowColor;
          context.fillText(
            line,
            x + (options.shadowOffsetX ?? 0),
            lineY + (options.shadowOffsetY ?? 0)
          );
        }

        context.fillStyle = color;
        context.fillText(line, x, lineY);
      });

      context.restore();
    }

    function measurePixelLine(text, size) {
      ctx.save();
      ctx.font = `${size}px "Press Start 2P", cursive`;
      const width = ctx.measureText(text).width;
      ctx.restore();
      return width;
    }

    function wrapPixelText(text, maxWidth, size) {
      return String(text)
        .split("\n")
        .map((paragraph) => {
          if (!paragraph) {
            return "";
          }

          const words = paragraph.split(/\s+/);
          const lines = [];
          let currentLine = "";

          for (const word of words) {
            const candidate = currentLine ? `${currentLine} ${word}` : word;
            if (!currentLine || measurePixelLine(candidate, size) <= maxWidth) {
              currentLine = candidate;
            } else {
              lines.push(currentLine);
              currentLine = word;
            }
          }

          if (currentLine) {
            lines.push(currentLine);
          }

          return lines.join("\n");
        })
        .join("\n");
    }

    function roundedRectPath(context, x, y, w, h, radius = 12) {
      const r = Math.min(radius, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.lineTo(x + w - r, y);
      context.quadraticCurveTo(x + w, y, x + w, y + r);
      context.lineTo(x + w, y + h - r);
      context.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      context.lineTo(x + r, y + h);
      context.quadraticCurveTo(x, y + h, x, y + h - r);
      context.lineTo(x, y + r);
      context.quadraticCurveTo(x, y, x + r, y);
      context.closePath();
    }

    function drawPixelBorder(context, x, y, w, h, color = PINK_DEEP) {
      const step = 4;
      const x0 = Math.round(x);
      const y0 = Math.round(y);
      const x1 = Math.round(x + w);
      const y1 = Math.round(y + h);

      context.save();
      context.fillStyle = color;

      for (let px = x0 + step; px <= x1 - step * 2; px += step) {
        context.fillRect(px, y0 - step, step, step);
        context.fillRect(px, y1, step, step);
      }

      for (let py = y0 + step; py <= y1 - step * 2; py += step) {
        context.fillRect(x0 - step, py, step, step);
        context.fillRect(x1, py, step, step);
      }

      [
        [x0 - step, y0 - step],
        [x0, y0 - step],
        [x0 - step, y0],
        [x1 - step, y0 - step],
        [x1, y0 - step],
        [x1, y0],
        [x0 - step, y1 - step],
        [x0 - step, y1],
        [x0, y1],
        [x1 - step, y1],
        [x1, y1 - step],
        [x1, y1]
      ].forEach(([px, py]) => {
        context.fillRect(px, py, step, step);
      });

      context.restore();
    }

    function drawPanel(context, x, y, w, h, fill = CREAM, borderColor = PINK_DARK, borderWidth = 3) {
      context.save();
      context.shadowColor = SHADOW;
      context.shadowOffsetX = 4;
      context.shadowOffsetY = 4;
      context.shadowBlur = 0;
      roundedRectPath(context, x, y, w, h, 12);
      context.fillStyle = fill;
      context.fill();
      context.shadowColor = "transparent";
      context.lineWidth = borderWidth;
      context.strokeStyle = borderColor;
      context.stroke();
      context.restore();

      drawPixelBorder(context, x, y, w, h, PINK_DEEP);
    }

    function registerUIButton(id, x, y, w, h, meta = {}) {
      gameState.uiButtons.push({ id, x, y, w, h, ...meta });
    }

    function drawButton(id, label, x, y, w, h, meta = {}) {
      const hovered = gameState.hoverButtonId === id;

      ctx.save();
      ctx.shadowColor = SHADOW;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;
      ctx.shadowBlur = 0;
      roundedRectPath(ctx, x, y, w, h, 12);
      ctx.fillStyle = hovered ? PINK_DARK : (meta.fill || PINK_MID);
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.lineWidth = 3;
      ctx.strokeStyle = PINK_DEEP;
      ctx.stroke();
      ctx.restore();

      drawPixelBorder(ctx, x, y, w, h, PINK_DEEP);
      pixelText(ctx, label, x + w / 2, y + h / 2 + 1, meta.textSize || 8, CREAM);
      registerUIButton(id, x, y, w, h, meta);
    }

    function pointInRect(x, y, rect) {
      return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    function buttonAtPoint(x, y) {
      for (let index = gameState.uiButtons.length - 1; index >= 0; index -= 1) {
        const button = gameState.uiButtons[index];
        if (pointInRect(x, y, button)) {
          return button;
        }
      }
      return null;
    }

    function canvasPointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - rect.left) / rect.width) * gameState.width,
        y: ((event.clientY - rect.top) / rect.height) * gameState.height
      };
    }

    function resetUiScreenState(mode = "none") {
      gameState.uiButtons = [];
      gameState.uiParticles = [];
      gameState.uiParticleMode = mode;
      gameState.uiSpawnTimer = 0;
      gameState.hoverButtonId = "";
    }

    function spawnUIParticles(type, options = {}) {
      const count = options.count ?? (type === "confetti" ? 16 : 4);
      const originX = options.x ?? gameState.width * (0.35 + Math.random() * 0.3);
      const originY = options.y ?? gameState.height * (0.35 + Math.random() * 0.3);
      const spreadX = options.spreadX ?? 140;
      const spreadY = options.spreadY ?? 80;

      for (let index = 0; index < count; index += 1) {
        const x = originX + (Math.random() - 0.5) * spreadX;
        const y = originY + (Math.random() - 0.5) * spreadY;

        if (type === "hearts") {
          gameState.uiParticles.push({
            type,
            x,
            y,
            vx: (Math.random() - 0.5) * 18,
            vy: -(24 + Math.random() * 26),
            life: 1.8 + Math.random() * 0.9,
            maxLife: 2.6,
            size: 12 + Math.random() * 4,
            emoji: "❤️",
            sway: Math.random() * Math.PI * 2
          });
          continue;
        }

        if (type === "stars") {
          gameState.uiParticles.push({
            type,
            x,
            y,
            vx: (Math.random() - 0.5) * 72,
            vy: (Math.random() - 0.5) * 64,
            life: 1 + Math.random() * 0.9,
            maxLife: 1.9,
            size: 10 + Math.random() * 4,
            emoji: "✨",
            sway: Math.random() * Math.PI * 2
          });
          continue;
        }

        gameState.uiParticles.push({
          type: "confetti",
          x,
          y,
          vx: (Math.random() - 0.5) * 140,
          vy: -40 + Math.random() * 120,
          life: 1.1 + Math.random() * 0.8,
          maxLife: 1.9,
          size: 5 + Math.random() * 3,
          color: randomChoice(UI_CONFETTI_COLORS),
          rotation: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 8
        });
      }
    }

    function updateUiParticles(dt) {
      if (gameState.uiParticleMode === "hearts") {
        gameState.uiSpawnTimer -= dt;
        if (gameState.uiSpawnTimer <= 0) {
          spawnUIParticles("hearts", {
            count: 2,
            x: gameState.width * (0.42 + Math.random() * 0.16),
            y: gameState.height * 0.74,
            spreadX: 180,
            spreadY: 24
          });
          gameState.uiSpawnTimer = 0.28;
        }
      } else if (gameState.uiParticleMode === "stars") {
        gameState.uiSpawnTimer -= dt;
        if (gameState.uiSpawnTimer <= 0) {
          spawnUIParticles("stars", {
            count: 2,
            x: gameState.width * (0.3 + Math.random() * 0.4),
            y: gameState.height * (0.28 + Math.random() * 0.28),
            spreadX: 220,
            spreadY: 140
          });
          gameState.uiSpawnTimer = 0.4;
        }
      } else if (gameState.uiParticleMode === "final") {
        gameState.uiSpawnTimer -= dt;
        if (gameState.uiSpawnTimer <= 0) {
          spawnUIParticles(Math.random() < 0.5 ? "hearts" : "confetti", {
            count: 4,
            x: gameState.width * 0.5,
            y: gameState.height * 0.42,
            spreadX: 320,
            spreadY: 220
          });
          gameState.uiSpawnTimer = 0.24;
        }
      }

      for (let index = gameState.uiParticles.length - 1; index >= 0; index -= 1) {
        const particle = gameState.uiParticles[index];
        particle.life -= dt;
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;

        if (particle.type === "hearts") {
          particle.sway += dt * 2.4;
          particle.x += Math.sin(particle.sway) * 10 * dt;
        } else if (particle.type === "stars") {
          particle.sway += dt * 3.1;
          particle.y += Math.cos(particle.sway) * 8 * dt;
        } else {
          particle.rotation += particle.spin * dt;
          particle.vy += 26 * dt;
        }

        if (particle.life <= 0) {
          gameState.uiParticles.splice(index, 1);
        }
      }
    }

    function drawUiParticles() {
      for (const particle of gameState.uiParticles) {
        const alpha = Math.max(0, particle.life / particle.maxLife);

        ctx.save();
        ctx.globalAlpha = alpha;

        if (particle.type === "confetti") {
          ctx.translate(particle.x, particle.y);
          ctx.rotate(particle.rotation);
          ctx.fillStyle = particle.color;
          ctx.fillRect(-particle.size / 2, -particle.size / 2, particle.size, particle.size);
          ctx.restore();
          continue;
        }

        pixelText(ctx, particle.emoji, particle.x, particle.y, particle.size, CREAM);
        ctx.restore();
      }
    }

    function handleAssetReady() {
      loadedAssets += 1;
      if (!booted && loadedAssets >= totalAssets) {
        bootGame();
      }
    }

    function queueImage(image, src) {
      totalAssets += 1;
      image.onload = handleAssetReady;
      image.onerror = () => {
        console.warn(`Missing asset: ${src}`);
        handleAssetReady();
      };
      image.src = src;
    }

    queueImage(sprites.sunflower, "sunflower.png");
    queueImage(sprites.seed, "seed.png");
    queueImage(sprites.cinamon, "cinamon.png");
    queueImage(sprites.dorito, "dorito.png");
    queueImage(sprites.chili, "chili.png");
    queueImage(sprites.cola, "cola.png");
    queueImage(sprites.snowball, "snowball.png");
    queueImage(sprites.vaina, "vaina.png");
    queueImage(sprites.hamster, "hamster.png");
    queueImage(sprites.star, "star.png");
    queueImage(sprites.feather, "feather.png");
    queueImage(sprites.note, "note.png");
    sprites.deco.forEach((image, index) => {
      queueImage(image, DECO_SPRITE_FILES[index]);
    });
    bgLayers.forEach((layers, levelIndex) => {
      layers.forEach((image, layerIndex) => {
        queueImage(image, `bg/level${levelIndex + 1}/${layerIndex + 1}.png`);
      });
    });
    photos.forEach((image, index) => {
      queueImage(image, `photos/${index + 1}.png`);
    });

    const gameState = {
      screen: "loading",
      fastMode: false,
      levelIndex: 0,
      totalScore: 0,
      levelScore: 0,
      lives: 3,
      chosenGift: "",
      lastTime: performance.now(),
      animTime: 0,
      width: 0,
      height: 0,
      dpr: Math.max(1, Math.min(window.devicePixelRatio || 1, 2)),
      worldOffset: 0,
      spawnCooldown: 0,
      starSpawnTimer: 0,
      snowballSpawnTimer: 0,
      uiSpawnTimer: 0,
      uiParticleMode: "none",
      hoverButtonId: "",
      giftReveal: {
        timer: 0,
        confettiBurst: false
      },
      input: {
        holding: false
      },
      hamster: {
        x: 0,
        y: 0,
        size: 64,
        radius: 28,
        vy: 0,
        invincibleTimer: 0,
        hitFlash: 0
      },
      objects: [],
      particles: [],
      uiParticles: [],
      uiButtons: [],
      levels: cloneLevels(false),
      frames: {
        hamster: 0,
        star: 0,
        feather: 0,
        note: 0
      }
    };

    function cloneLevels(fastMode) {
      return LEVELS.map((level) => ({
        ...level,
        pointsNeeded: fastMode ? Math.max(1, Math.ceil(level.pointsNeeded / 2)) : level.pointsNeeded
      }));
    }

    function currentLevel() {
      return gameState.levels[gameState.levelIndex] || gameState.levels[0] || LEVELS[0];
    }

    function musicKeyForLevel(levelIndex) {
      if (levelIndex === 1) {
        return "music_level2";
      }
      if (levelIndex === 2) {
        return "music_level3";
      }
      return "music_intro";
    }

    function randomChoice(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function levelSpeed() {
      return 260 + gameState.levelIndex * 38;
    }

    function updateAnimationFrames() {
      gameState.frames.hamster = Math.floor(gameState.animTime * 12) % 10;
      gameState.frames.star = Math.floor(gameState.animTime * 10) % 14;
      gameState.frames.feather = Math.floor(gameState.animTime * 8) % 8;
      gameState.frames.note = Math.floor(gameState.animTime * 10) % 4;
    }

    function resetHamsterPosition() {
      gameState.hamster.x = gameState.width * 0.28;
      gameState.hamster.y = gameState.height * 0.5;
      gameState.hamster.vy = 0;
      gameState.hamster.invincibleTimer = 0;
      gameState.hamster.hitFlash = 0;
      gameState.hamster.radius = gameState.hamster.size * 0.42;
    }

    function resetGiftRevealState() {
      gameState.giftReveal.timer = 0;
      gameState.giftReveal.confettiBurst = false;
    }

    function resetRunState() {
      gameState.objects = [];
      gameState.particles = [];
      gameState.worldOffset = 0;
      gameState.spawnCooldown = 0;
      gameState.starSpawnTimer = 0;
      gameState.snowballSpawnTimer = 0;
      gameState.animTime = 0;
      gameState.input.holding = false;
      resetGiftRevealState();
      resetHamsterPosition();

      syncHud();
      AudioManager.play(musicKeyForLevel(gameState.levelIndex));

      gameState.screen = "playing";
      resetUiScreenState("none");
      resetRunState();
      hideOverlay();
      syncHud();
      AudioManager.play(musicKeyForLevel(gameState.levelIndex));

    function resumeGame() {

      gameState.levelIndex = Math.max(0, Math.min(gameState.levels.length - 1, levelIndex));

      gameState.chosenGift = "";
      gameState.screen = "playing";
      resetUiScreenState("none");
      resetRunState();
      hideOverlay();
      syncHud();
      AudioManager.play(musicKeyForLevel(gameState.levelIndex));

    }

    function hideOverlay() {
    }

    function handleUiAction(button) {
      if (!button) {
        return;
      }

      gameState.hoverButtonId = button.id;

      if (button.action === "level") {
        jumpToLevel(Number(button.levelIndex));
        return;
      }

      if (button.action === "start") {
        startGame(false);
      } else if (button.action === "fast") {
        startGame(true);
      } else if (button.action === "continue") {
        startNextLevel();
      } else if (button.action === "resume") {
        resumeGame();
      } else if (button.action === "retry") {
        retryGame();
      } else if (button.action === "restart") {
        jumpToLevel(gameState.levelIndex);
      } else if (button.action === "menu") {
        showStartScreen();
      } else if (button.action === "mute") {
        AudioManager.toggleMute();
      } else if (button.action === "gift") {
        chooseFinalGift(button.gift);
      }
    }

    function drawStaticSprite(key, cx, cy, width, height = width) {
      const image = sprites[key];
      if (!image || !image.naturalWidth) {
        return;
      }

      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(image, cx - width / 2, cy - height / 2, width, height);
      ctx.restore();
    }

    function drawAnimatedSprite(key, frameIndex, cx, cy, size) {
      const image = sprites[key];
      const totalFrames = ANIMATED_SPRITE_FRAMES[key];
      if (!image || !image.naturalWidth || !totalFrames) {
        return;
      }

      const frame = frameIndex % totalFrames;
      const srcX = (frame % 3) * FRAME_SIZE;
      const srcY = Math.floor(frame / 3) * FRAME_SIZE;

      ctx.save();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(image, srcX, srcY, FRAME_SIZE, FRAME_SIZE, cx - size / 2, cy - size / 2, size, size);
      ctx.restore();
    }

    function spawnCollectible(level, minY, maxY) {
      const isCandyLevel = level.obstacleType === "star";
      const bad = isCandyLevel && Math.random() < 0.3;
      const spriteKey = bad ? randomChoice(["chili", "cola"]) : randomChoice(level.collectSprites);
      const y = minY + Math.random() * Math.max(10, maxY - minY);
      const collectible = {
        type: "collect",
        spriteKey,
        bad,
        x: gameState.width + 60 + Math.random() * 50,
        y,
        baseY: y,
        radius: 20,
        size: 48,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 1.5 + Math.random() * 2,
        drift: (Math.random() - 0.5) * 16,
        rotation: (Math.random() - 0.5) * 0.18
      };
      gameState.objects.push(collectible);

      if (Math.random() < 0.32) {
        const extraY = Math.min(maxY, Math.max(minY, y + (Math.random() < 0.5 ? -55 : 55)));
        gameState.objects.push({
          ...collectible,
          x: collectible.x + 52,
          y: extraY,
          baseY: extraY,
          wobble: Math.random() * Math.PI * 2,
          drift: (Math.random() - 0.5) * 16,
          rotation: (Math.random() - 0.5) * 0.18
        });
      }
    }

    function spawnVainaObstacle(ceilingY, floorY) {
      const edge = Math.random() < 0.5 ? "top" : "bottom";
      const drawH = gameState.height * (0.25 + Math.random() * 0.08);
      const drawW = drawH * VAINA_ASPECT_RATIO;
      gameState.objects.push({
        type: "obstacle",
        spriteKey: "vaina",
        fixed: true,
        edge,
        x: gameState.width + 70 + Math.random() * 42,
        y: edge === "top" ? ceilingY + drawH / 2 : floorY - drawH / 2,
        drawW,
        drawH,
        hitbox: {
          w: drawW * 0.4,
          h: drawH
        }
      });
    }

    function spawnStarObstacle(ceilingY, floorY) {
      const spawnFromRight = Math.random() < 0.6;
      gameState.objects.push({
        type: "obstacle",
        spriteKey: "star",
        fixed: false,
        x: spawnFromRight ? gameState.width + 64 + Math.random() * 28 : Math.random() * gameState.width,
        y: spawnFromRight
          ? ceilingY + Math.random() * Math.max(10, floorY - ceilingY)
          : ceilingY,
        vx: -(levelSpeed() * 0.8 + Math.random() * 60),
        vy: 90 + Math.random() * 140,
        radius: 20,
        size: 48,
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 3.4
      });
    }

    function spawnSnowballObstacle(ceilingY, floorY) {
      gameState.objects.push({
        type: "obstacle",
        spriteKey: "snowball",
        fixed: false,
        x: gameState.width + 64 + Math.random() * 24,
        y: ceilingY + 30 + Math.random() * Math.max(10, floorY - ceilingY - 60),
        vx: -(240 + Math.random() * 220),
        vy: 0,
        radius: 20,
        size: 40,
        rotation: 0
      });
    }

    function spawnObstacle(level, ceilingY, floorY) {
      if (level.obstacleType === "vaina") {
        spawnVainaObstacle(ceilingY, floorY);
      } else if (level.obstacleType === "star") {
        spawnStarObstacle(ceilingY, floorY);
      } else if (level.obstacleType === "snowball") {
        spawnSnowballObstacle(ceilingY, floorY);
      }
    }

    function spawnObject() {
      const level = currentLevel();
      const ceilingY = 48;
      const floorY = gameState.height - 50;
      const minY = ceilingY + 30;
      const maxY = floorY - 30;

      if (level.obstacleType !== "vaina") {
        spawnCollectible(level, minY, maxY);
      } else if (Math.random() < 0.56) {
        spawnCollectible(level, minY, maxY);
      } else {
        spawnObstacle(level, ceilingY, floorY);
      }
    }

    function spawnCollectParticles(x, y) {
      const palette = ["#ffe066", "#ffb347", "#7bdff2", "#b8f2e6", "#ffffff"];
      for (let i = 0; i < 12; i += 1) {
        gameState.particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 180,
          vy: (Math.random() - 1.1) * 180,
          life: 0.55 + Math.random() * 0.35,
          maxLife: 0.9,
          size: 3 + Math.random() * 5,
          color: palette[i % palette.length]
        });
      }
    }

    function spawnHitParticles(x, y) {
      for (let i = 0; i < 12; i += 1) {
        gameState.particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 220,
          vy: (Math.random() - 0.6) * 220,
          life: 0.35 + Math.random() * 0.25,
          maxLife: 0.65,
          size: 4 + Math.random() * 4,
          color: i % 2 === 0 ? "#ff6b6b" : "#ffffff"
        });
      }
    }

    function updateObjectMotion(obj, dt, speed) {
      if (obj.type === "collect") {
        obj.x -= speed * dt;
        obj.wobble += obj.wobbleSpeed * dt;
        obj.y = obj.baseY + Math.sin(obj.wobble) * 14 + obj.drift * Math.sin(obj.wobble * 0.6);
        return;
      }

      if (obj.fixed) {
        obj.x -= speed * dt;
        return;
      }

      obj.x += obj.vx * dt;
      obj.y += (obj.vy || 0) * dt;
      obj.rotation += (obj.spin || 0) * dt;
    }

    function isObjectOffscreen(obj) {
      if (obj.spriteKey === "vaina") {
        return obj.x < -(obj.drawW || 40);
      }

      if (obj.type === "collect") {
        return obj.x < -80;
      }

      if (obj.spriteKey === "star") {
        return obj.x < -80 || obj.y > gameState.height + 80;
      }

      if (obj.spriteKey === "snowball") {
        return obj.x < -80;
      }

      return obj.x < -80;
    }

    function collidesWithHamster(obj) {
      const hamster = gameState.hamster;
      const dx = hamster.x - obj.x;
      const dy = hamster.y - obj.y;

      if (obj.fixed) {
        return Math.abs(dx) < (hamster.radius + obj.hitbox.w / 2)
          && Math.abs(dy) < (hamster.radius + obj.hitbox.h / 2);
      }

      return Math.hypot(dx, dy) < hamster.radius + (obj.radius || 20) * 0.78;
    }

    function updatePlaying(dt) {
      const hamster = gameState.hamster;
      const level = currentLevel();
      const speed = levelSpeed();
      const upwardForce = -980;
      const gravity = 1260;
      const floorY = gameState.height - 50;
      const ceilingY = 48;

      gameState.worldOffset += speed * dt;
      gameState.spawnCooldown -= dt;
      gameState.starSpawnTimer -= dt;
      gameState.snowballSpawnTimer -= dt;

      if (gameState.spawnCooldown <= 0) {
        spawnObject();
        gameState.spawnCooldown = Math.max(0.24, 0.72 - gameState.levelIndex * 0.07 + Math.random() * 0.24);
      }

      if (level.obstacleType === "star" && gameState.starSpawnTimer <= 0) {
        spawnStarObstacle(ceilingY, floorY);
        gameState.starSpawnTimer = Math.max(0.15, 0.4 - gameState.levelIndex * 0.05);
      }

      if (level.obstacleType === "snowball" && gameState.snowballSpawnTimer <= 0) {
        const count = Math.random() < 0.5 ? 1 : 2;
        for (let i = 0; i < count; i += 1) {
          spawnSnowballObstacle(ceilingY, floorY);
        }
        gameState.snowballSpawnTimer = 0.5;
      }

      hamster.vy += (gameState.input.holding ? upwardForce : gravity) * dt;
      hamster.vy = Math.max(-460, Math.min(560, hamster.vy));
      hamster.y += hamster.vy * dt;

      if (hamster.y > floorY) {
        hamster.y = floorY;
        hamster.vy = Math.min(0, hamster.vy) * 0.4;
      }

      if (hamster.y < ceilingY) {
        hamster.y = ceilingY;
        hamster.vy = 0;
      }

      hamster.invincibleTimer = Math.max(0, hamster.invincibleTimer - dt);
      hamster.hitFlash = Math.max(0, hamster.hitFlash - dt);

      for (let i = gameState.objects.length - 1; i >= 0; i -= 1) {
        const obj = gameState.objects[i];
        updateObjectMotion(obj, dt, speed);

        if (isObjectOffscreen(obj)) {
          gameState.objects.splice(i, 1);
          continue;
        }

        if (!collidesWithHamster(obj)) {
          continue;
        }

        if (obj.type === "collect" && !obj.bad) {
          gameState.objects.splice(i, 1);
          gameState.totalScore += 1;
          gameState.levelScore += 1;
          spawnCollectParticles(obj.x, obj.y);
          syncHud();

          if (gameState.levelScore >= level.pointsNeeded) {
            gameState.objects = [];
            gameState.particles = [];
            showRewardScreen();
            return;
          }

          continue;
        }

        if (hamster.invincibleTimer > 0) {
          continue;
        }

        if (!obj.fixed || obj.bad) {
          gameState.objects.splice(i, 1);
        }
        gameState.lives -= 1;
        hamster.invincibleTimer = 1.15;
        hamster.hitFlash = 0.2;
        hamster.vy = -240;
        spawnHitParticles(obj.x, obj.y);
        syncHud();

        if (gameState.lives <= 0) {
          showGameOverScreen();
          return;
        }
      }

      for (let i = gameState.particles.length - 1; i >= 0; i -= 1) {
        const particle = gameState.particles[i];
        particle.life -= dt;
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 220 * dt;
        if (particle.life <= 0) {
          gameState.particles.splice(i, 1);
        }
      }
    }

    function drawBackground(offset = gameState.worldOffset, levelIndex = gameState.levelIndex) {
      ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = "#1f1221";
      ctx.fillRect(0, 0, gameState.width, gameState.height);

      const layers = bgLayers[levelIndex] || bgLayers[0];
      const divisor = Math.max(1, layers.length - 1);

      layers.forEach((image, index) => {
        if (!image.naturalWidth) {
          return;
        }

        const speed = 0.05 + (index / divisor) * 0.55;
        const x = -((offset * speed) % gameState.width);
        ctx.drawImage(image, x, 0, gameState.width, gameState.height);
        ctx.drawImage(image, x + gameState.width, 0, gameState.width, gameState.height);
        if (x > 0) {
          ctx.drawImage(image, x - gameState.width, 0, gameState.width, gameState.height);
        }
      });
    }

    function drawHamster() {
      const hamster = gameState.hamster;
      const blink = hamster.invincibleTimer > 0 && Math.floor(hamster.invincibleTimer * 18) % 2 === 0;

      ctx.fillStyle = hamster.hitFlash > 0 ? "rgba(255, 90, 90, 0.32)" : "rgba(255, 209, 102, 0.22)";
      ctx.beginPath();
      ctx.arc(hamster.x, hamster.y, hamster.radius + 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(68, 42, 22, 0.78)";
      ctx.fillRect(hamster.x - 24, hamster.y + hamster.size * 0.42, 50, 6);

      if (blink) {
        return;
      }

      drawAnimatedSprite("hamster", gameState.frames.hamster, hamster.x, hamster.y, hamster.size);
    }

    function drawVaina(obj) {
      const anchorY = obj.edge === "top" ? 48 : gameState.height - 50;
      ctx.save();
      ctx.translate(obj.x, anchorY);
      ctx.imageSmoothingEnabled = false;
      if (obj.edge === "top") {
        ctx.scale(1, -1);
      }
      if (sprites.vaina.naturalWidth) {
        ctx.drawImage(
          sprites.vaina,
          -obj.drawW / 2,
          -obj.drawH,
          obj.drawW,
          obj.drawH
        );
      }
      ctx.restore();
    }

    function drawCollectible(obj) {
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.arc(obj.x, obj.y, obj.radius + 2, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(Math.sin(obj.wobble) * obj.rotation);
      if (obj.spriteKey === "feather") {
        drawAnimatedSprite("feather", gameState.frames.feather, 0, 0, obj.size);
      } else if (obj.spriteKey === "note") {
        drawAnimatedSprite("note", gameState.frames.note, 0, 0, obj.size);
      } else {
        drawStaticSprite(obj.spriteKey, 0, 0, STATIC_SPRITE_SIZES[obj.spriteKey] || obj.size);
      }
      ctx.restore();
    }

    function drawMovingObstacle(obj) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation || 0);
      if (obj.spriteKey === "star") {
        drawAnimatedSprite("star", gameState.frames.star, 0, 0, obj.size);
      } else {
        drawStaticSprite(obj.spriteKey, 0, 0, STATIC_SPRITE_SIZES[obj.spriteKey] || obj.size);
      }
      ctx.restore();
    }

    function drawObjects() {
      for (const obj of gameState.objects) {
        if (obj.spriteKey === "vaina") {
          drawVaina(obj);
        } else if (obj.type === "collect") {
          drawCollectible(obj);
        } else {
          drawMovingObstacle(obj);
        }
      }
    }

    function drawParticles() {
      for (const particle of gameState.particles) {
        const alpha = Math.max(0, particle.life / particle.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.color;
        ctx.fillRect(particle.x, particle.y, particle.size, particle.size);
        ctx.restore();
      }
    }

    function drawVignetteOverlay() {
      const gradient = ctx.createRadialGradient(
        gameState.width * 0.5,
        gameState.height * 0.42,
        gameState.width * 0.14,
        gameState.width * 0.5,
        gameState.height * 0.5,
        gameState.width * 0.72
      );
      gradient.addColorStop(0, "rgba(255, 214, 231, 0.02)");
      gradient.addColorStop(0.58, "rgba(224, 85, 154, 0.14)");
      gradient.addColorStop(1, "rgba(180, 60, 120, 0.35)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, gameState.width, gameState.height);
    }

    function drawTintOverlay(alpha = 0.45) {
      ctx.fillStyle = `rgba(180, 60, 120, ${alpha})`;
      ctx.fillRect(0, 0, gameState.width, gameState.height);
    }

    function easeOutBack(t) {
      if (t <= 0) {
        return 0;
      }
      if (t >= 1) {
        return 1;
      }

      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function hashNoise(value) {
      const raw = Math.sin(value * 127.1) * 43758.5453123;
      return raw - Math.floor(raw);
    }

    function updateGiftReveal(dt) {
      gameState.giftReveal.timer += dt;

      if (!gameState.giftReveal.confettiBurst && gameState.giftReveal.timer >= 2) {
        gameState.giftReveal.confettiBurst = true;
        spawnUIParticles("confetti", {
          count: 30,
          x: gameState.width * 0.5,
          y: gameState.height * 0.48,
          spreadX: 420,
          spreadY: 160
        });
      }
    }

    function drawHud() {
      const level = currentLevel();
      const progress = Math.min(1, gameState.levelScore / level.pointsNeeded);

      ctx.fillStyle = "rgba(255,214,231,0.82)";
      ctx.fillRect(0, 0, gameState.width, 48);
      ctx.fillStyle = PINK_LIGHT;
      ctx.fillRect(0, 48, gameState.width, 6);
      ctx.fillStyle = PINK_DARK;
      ctx.fillRect(0, 48, gameState.width * progress, 6);

      drawAnimatedSprite("hamster", gameState.frames.hamster, 24, 24, 28);
      pixelText(ctx, "❤️".repeat(gameState.lives), 48, 24, 14, PINK_DEEP, { align: "left" });
      pixelText(ctx, level.theme, gameState.width * 0.5, 24, 6, PINK_DEEP);
      pixelText(
        ctx,
        `PTS: ${String(gameState.totalScore).padStart(3, "0")}`,
        gameState.width - 18,
        24,
        7,
        PINK_DEEP,
        { align: "right" }
      );
    }

    function shouldShowMuteButton() {
      return gameState.screen !== "loading"
        && gameState.screen !== "gameover"
        && gameState.screen !== "finalScreen";
    }

    function drawMuteButton() {
      const x = gameState.width - 44;
      const y = 8;
      const hovered = gameState.hoverButtonId === "mute-toggle";
      drawPanel(ctx, x, y, 32, 32, hovered ? PINK_LIGHT : CREAM);
      pixelText(ctx, AudioManager.muted ? "🔇" : "🔊", x + 16, y + 16, 14, PINK_DEEP);
      registerUIButton("mute-toggle", x, y, 32, 32, {
        action: "mute"
      });
    }

    function drawStartScreen() {
      drawVignetteOverlay();
      drawUiParticles();

      const panelW = Math.min(480, gameState.width - 32);
      const panelH = Math.min(380, gameState.height - 40);
      const panelX = (gameState.width - panelW) / 2;
      const panelY = (gameState.height - panelH) / 2;
      const centerX = panelX + panelW / 2;
      const titleSize = gameState.width < 600 ? 16 : 20;
      const hamsterY = panelY + 82;
      const buttonW = Math.min(200, panelW - 44);
      const buttonH = 44;

      drawPanel(ctx, panelX, panelY, panelW, panelH);

      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = PINK_MID;
      ctx.beginPath();
      ctx.arc(centerX, hamsterY, 56, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawAnimatedSprite("hamster", gameState.frames.hamster, centerX, hamsterY, 96);
      pixelText(ctx, "HAMSTER\nRUN", centerX, panelY + 156, titleSize, PINK_DEEP, {
        shadowColor: PINK_LIGHT,
        shadowOffsetX: 2,
        shadowOffsetY: 2,
        lineHeight: titleSize + 10
      });
      pixelText(ctx, "un regalo para ti 🎀", centerX, panelY + 220, 7, PURPLE_SOFT);

      const buttonX = centerX - buttonW / 2;
      drawButton("start-main", "▶ JUGAR", buttonX, panelY + 236, buttonW, buttonH, {
        action: "start"
      });
      drawButton("start-fast", "⚡ MODO RÁPIDO", buttonX, panelY + 292, buttonW, buttonH, {
        action: "fast",
        textSize: 7
      });

      if (Math.floor(gameState.animTime / 0.8) % 2 === 0) {
        pixelText(ctx, "ESPACIO / TAP para volar", centerX, panelY + panelH - 20, 6, PINK_DARK);
      }
    }

    function drawPauseScreen() {
      drawTintOverlay(0.45);
      drawUiParticles();

      const panelW = Math.min(360, gameState.width - 30);
      const panelH = Math.min(260, gameState.height - 40);
      const panelX = (gameState.width - panelW) / 2;
      const panelY = (gameState.height - panelH) / 2;
      const centerX = panelX + panelW / 2;
      const buttonW = Math.min(220, panelW - 50);

      drawPanel(ctx, panelX, panelY, panelW, panelH);
      pixelText(ctx, "PAUSA", centerX, panelY + 40, 16, PINK_DEEP);
      drawAnimatedSprite("hamster", 0, centerX, panelY + 98, 64);
      drawButton("pause-resume", "▶ CONTINUAR", centerX - buttonW / 2, panelY + 138, buttonW, 40, {
        action: "resume"
      });
      drawButton("pause-restart", "↩ REINICIAR", centerX - buttonW / 2, panelY + 188, buttonW, 40, {
        action: "restart"
      });
      pixelText(ctx, "ESC para continuar", centerX, panelY + panelH - 22, 6, PURPLE_SOFT);

      const footerY = panelY + panelH + 14;
      if (footerY + 28 <= gameState.height - 8) {
        drawButton("pause-menu", "MENU", centerX - 132, footerY, 84, 28, {
          action: "menu",
          textSize: 6
        });
        drawButton("pause-level-1", "N1", centerX - 36, footerY, 44, 28, {
          action: "level",
          levelIndex: 0,
          textSize: 6
        });
        drawButton("pause-level-2", "N2", centerX + 18, footerY, 44, 28, {
          action: "level",
          levelIndex: 1,
          textSize: 6
        });
        drawButton("pause-level-3", "N3", centerX + 72, footerY, 44, 28, {
          action: "level",
          levelIndex: 2,
          textSize: 6
        });
      }
    }

    function drawGameOverScreen() {
      drawTintOverlay(0.45);
      drawUiParticles();

      const panelW = Math.min(380, gameState.width - 30);
      const panelH = Math.min(280, gameState.height - 40);
      const panelX = (gameState.width - panelW) / 2;
      const panelY = (gameState.height - panelH) / 2;
      const centerX = panelX + panelW / 2;

      drawPanel(ctx, panelX, panelY, panelW, panelH);
      pixelText(ctx, "GAME OVER", centerX, panelY + 48, 16, PINK_DEEP, {
        shadowColor: PINK_LIGHT,
        shadowOffsetX: 2,
        shadowOffsetY: 2
      });
      pixelText(ctx, "el hamster se cayó... 🐹", centerX, panelY + 98, 7, PURPLE_SOFT);
      pixelText(ctx, `PUNTOS: ${gameState.totalScore}`, centerX, panelY + 146, 8, PINK_DARK);
      drawButton("gameover-retry", "↩ REINTENTAR", centerX - 100, panelY + 186, 200, 44, {
        action: "retry"
      });
      drawButton("gameover-menu", "MENU", centerX - 58, panelY + 238, 116, 28, {
        action: "menu",
        textSize: 6
      });
    }

    function drawRewardScreenPanel() {
      const level = currentLevel();
      drawTintOverlay(0.4);
      drawUiParticles();

      const panelW = Math.min(440, gameState.width - 30);
      const panelH = Math.min(320, gameState.height - 40);
      const panelX = (gameState.width - panelW) / 2;
      const panelY = (gameState.height - panelH) / 2;
      const centerX = panelX + panelW / 2;
      const message = wrapPixelText(level.reward, panelW - 70, 8);

      drawPanel(ctx, panelX, panelY, panelW, panelH);
      drawAnimatedSprite("hamster", gameState.frames.hamster, centerX, panelY + 80, 80);
      pixelText(ctx, "¡NIVEL COMPLETO!", centerX, panelY + 146, 11, PINK_DEEP);
      pixelText(ctx, message, centerX, panelY + 206, 8, PURPLE_SOFT, {
        lineHeight: 18
      });
      drawButton("reward-next", "SIGUIENTE NIVEL ▶", centerX - 132, panelY + 260, 264, 44, {
        action: "continue"
      });
    }

    function drawGiftTornPaper(cx, y, width, progress) {
      if (progress <= 0) {
        return;
      }

      ctx.save();
      ctx.translate(cx, y);
      ctx.scale(1, progress);

      ctx.fillStyle = PINK_MID;
      ctx.beginPath();
      ctx.moveTo(-width * 0.43, 0);
      ctx.lineTo(-width * 0.3, -22);
      ctx.lineTo(-width * 0.18, -4);
      ctx.lineTo(-width * 0.05, -28);
      ctx.lineTo(width * 0.07, -8);
      ctx.lineTo(width * 0.22, -26);
      ctx.lineTo(width * 0.41, 0);
      ctx.lineTo(width * 0.18, 26);
      ctx.lineTo(0, 10);
      ctx.lineTo(-width * 0.22, 24);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = YELLOW_SOFT;
      ctx.beginPath();
      ctx.moveTo(-width * 0.18, -6);
      ctx.lineTo(-width * 0.05, -30);
      ctx.lineTo(width * 0.11, -2);
      ctx.lineTo(width * 0.24, -22);
      ctx.lineTo(width * 0.31, 8);
      ctx.lineTo(width * 0.08, 18);
      ctx.lineTo(-width * 0.08, 12);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawGiftBox(id, gift, label, x, y, w, h, openProgress, clickable) {
      const hovered = clickable && gameState.hoverButtonId === id;
      const fill = hovered ? "#FFF0BB" : YELLOW_SOFT;
      const centerX = x + w / 2;
      const centerY = y + h / 2;
      const revealAlpha = Math.min(1, Math.max(0, openProgress));
      const bowSize = Math.max(18, Math.round(w / 8));
      const labelSize = Math.max(9, Math.round(w / 18));

      drawPanel(ctx, x, y, w, h, fill, PINK_DEEP, 4);
      ctx.fillStyle = PINK_DARK;
      ctx.fillRect(x + w / 2 - 2, y + 8, 4, h - 16);
      ctx.fillRect(x + 8, y + h / 2 - 2, w - 16, 4);
      pixelText(ctx, "🎀", centerX, centerY, bowSize, PINK_DEEP);
      drawGiftTornPaper(centerX, y + 14, w * 0.9, openProgress);

      if (revealAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = revealAlpha;
        pixelText(ctx, label, centerX, centerY + h * 0.16, labelSize, PINK_DEEP, {
          lineHeight: Math.round(labelSize * 1.85)
        });
        ctx.restore();
      }

      if (clickable) {
        registerUIButton(id, x, y, w, h, {
          action: "gift",
          gift
        });
      }
    }

    function drawGiftRevealScreen() {
      drawTintOverlay(0.5);
      drawUiParticles();

      const timer = gameState.giftReveal.timer;
      const scale = Math.max(0.56, Math.min(1, (gameState.width - 50) / 560, (gameState.height - 80) / 340));
      const boxW = 220 * scale;
      const boxH = 280 * scale;
      const gap = 80 * scale;
      const finalLeftX = gameState.width / 2 - gap / 2 - boxW;
      const finalRightX = gameState.width / 2 + gap / 2;
      const finalY = gameState.height / 2 - boxH / 2;
      const slideProgress = easeOutBack((timer - 0.6) / 0.8);
      const openProgress = Math.max(0, Math.min(1, (timer - 2) / 0.4));
      const clickable = openProgress >= 1;
      let leftX = -300 + (finalLeftX + 300) * slideProgress;
      let rightX = gameState.width + 300 + (finalRightX - gameState.width - 300) * slideProgress;
      let leftY = finalY;
      let rightY = finalY;

      if (timer >= 1.4 && timer < 2) {
        const sample = Math.floor((timer - 1.4) * 20);
        leftX += (hashNoise(sample + 1.7) - 0.5) * 8;
        leftY += (hashNoise(sample + 3.1) - 0.5) * 8;
        rightX += (hashNoise(sample + 8.3) - 0.5) * 8;
        rightY += (hashNoise(sample + 11.2) - 0.5) * 8;
      }

      drawGiftBox("gift-reveal-record", "tocadiscos", "🎵\nTocadiscos", leftX, leftY, boxW, boxH, openProgress, clickable);
      drawGiftBox("gift-reveal-parka", "parka", "🧥\nParka", rightX, rightY, boxW, boxH, openProgress, clickable);

      if (timer < 0.6) {
        ctx.fillStyle = `rgba(255,255,255,${1 - timer / 0.6})`;
        ctx.fillRect(0, 0, gameState.width, gameState.height);
      }
    }

    function drawPhotoCard(image, x, y, w, h, angleDeg) {
      ctx.save();
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate((angleDeg * Math.PI) / 180);

      if (image && image.naturalWidth) {
        drawPanel(ctx, -w / 2, -h / 2, w, h, "rgba(255,245,249,0.96)");
        roundedRectPath(ctx, -w / 2 + 10, -h / 2 + 10, w - 20, h - 20, 10);
        ctx.clip();
        ctx.drawImage(image, -w / 2 + 10, -h / 2 + 10, w - 20, h - 20);
      } else {
        drawPanel(ctx, -w / 2, -h / 2, w, h, "rgba(255,245,249,0.92)");
        pixelText(ctx, "📷", 0, 0, Math.max(28, Math.round(w / 4.8)), PINK_DEEP);
      }

      ctx.restore();
    }

    function drawFinalScreen() {
      ctx.fillStyle = "rgba(255,214,231,0.7)";
      ctx.fillRect(0, 0, gameState.width, gameState.height);

      const photoScale = Math.max(0.62, Math.min(1.08, gameState.width / 980, gameState.height / 760));
      const photoW = 165 * photoScale;
      const photoH = 210 * photoScale;
      const leftXTop = Math.max(24, 60 * photoScale);
      const leftXBottom = Math.max(38, 80 * photoScale);
      const rightXTop = gameState.width - photoW - Math.max(24, 60 * photoScale);
      const rightXBottom = gameState.width - photoW - Math.max(38, 80 * photoScale);
      const topYLeft = Math.max(70, 120 * photoScale);
      const bottomYLeft = Math.min(gameState.height - photoH - 100, 340 * photoScale);
      const topYRight = Math.max(54, 100 * photoScale);
      const bottomYRight = Math.min(gameState.height - photoH - 110, 330 * photoScale);
      const centerX = gameState.width * 0.5;
      const textWidth = Math.min(400, Math.max(240, gameState.width - photoW * 2 - 90));
      const titleSize = gameState.width < 720 ? 14 : 17;
      const giftSize = gameState.width < 720 ? 9 : 11;
      const generalSize = gameState.width < 720 ? 8 : 10;
      const titleLineHeight = gameState.width < 720 ? 32 : 38;
      const giftLineHeight = gameState.width < 720 ? 22 : 26;
      const generalLineHeight = gameState.width < 720 ? 20 : 24;
      const titleY = Math.max(118, gameState.height * 0.19);
      const giftY = Math.max(titleY + 132, gameState.height * 0.44);
      const generalY = Math.min(gameState.height - 150, giftY + 150);
      const buttonW = Math.min(248, gameState.width - 40);
      const title = gameState.chosenGift === "tocadiscos"
        ? "Tu regalo es\nun Tocadiscos 🎵"
        : "Tu regalo es\nuna Parka 🧥";
      const giftText = gameState.chosenGift === "tocadiscos"
        ? GIFT_TEXT_TOCADISCOS
        : GIFT_TEXT_PARKA;

      drawPhotoCard(photos[0], leftXTop, topYLeft, photoW, photoH, -8);
      drawPhotoCard(photos[1], leftXBottom, bottomYLeft, photoW, photoH, 5);
      drawPhotoCard(photos[2], rightXTop, topYRight, photoW, photoH, 6);
      drawPhotoCard(photos[3], rightXBottom, bottomYRight, photoW, photoH, -9);
      drawUiParticles();

      pixelText(ctx, title, centerX, titleY, titleSize, PINK_DEEP, {
        lineHeight: titleLineHeight
      });
      pixelText(ctx, wrapPixelText(giftText, textWidth, giftSize), centerX, giftY, giftSize, PURPLE_SOFT, {
        lineHeight: giftLineHeight
      });
      pixelText(ctx, wrapPixelText(GIFT_TEXT_GENERAL, textWidth, generalSize), centerX, generalY, generalSize, PINK_DEEP      , {
        lineHeight: generalLineHeight
      });
      drawButton("final-play-again", "↩ Jugar de nuevo", centerX - buttonW / 2, gameState.height - 78, buttonW, 44, {
        action: "menu",
        textSize: 7
      });
    }

    function drawGameplayScene() {
      drawBackground();
      drawObjects();
      drawParticles();
      drawHamster();
    }

    function drawScene() {
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, gameState.width, gameState.height);
      gameState.uiButtons = [];

      if (gameState.screen === "start") {
        drawBackground(0, 0);
        drawStartScreen();
        if (shouldShowMuteButton()) {
          drawMuteButton();
        }
        return;
      }

      if (gameState.screen === "reward") {
        drawBackground(gameState.worldOffset, gameState.levelIndex);
        drawRewardScreenPanel();
        if (shouldShowMuteButton()) {
          drawMuteButton();
        }
        return;
      }

      if (gameState.screen === "giftReveal") {
        drawBackground(gameState.worldOffset, gameState.levelIndex);
        drawGiftRevealScreen();
        if (shouldShowMuteButton()) {
          drawMuteButton();
        }
        return;
      }

      if (gameState.screen === "finalScreen") {
        drawBackground(gameState.worldOffset, gameState.levelIndex);
        drawFinalScreen();
        return;
      }

      drawGameplayScene();

      if (gameState.screen === "playing") {
        drawHud();
      } else if (gameState.screen === "paused") {
        drawPauseScreen();
      } else if (gameState.screen === "gameover") {
        drawGameOverScreen();
      }

      if (shouldShowMuteButton()) {
        drawMuteButton();
      }
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - gameState.lastTime) / 1000 || 0.016);
      gameState.lastTime = now;

      if (gameState.screen === "playing") {
        gameState.animTime += dt;
        updateAnimationFrames();
        updatePlaying(dt);
      } else if (gameState.screen !== "loading") {
        if (gameState.screen !== "paused") {
          gameState.animTime += dt;
          updateAnimationFrames();
        }
        if (gameState.screen === "giftReveal") {
          updateGiftReveal(dt);
        }
        updateUiParticles(dt);
      }

      drawScene();
      syncHud();
      requestAnimationFrame(loop);
    }

    function bootGame() {
      if (booted) {
        return;
      }

      booted = true;
      gameState.lastTime = performance.now();
      resizeCanvas();
      showStartScreen();
      drawScene();
      requestAnimationFrame(loop);
    }

    function resizeCanvas() {
      const rect = shell.getBoundingClientRect();
      gameState.dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      gameState.width = rect.width;
      gameState.height = rect.height;
      canvas.width = Math.round(rect.width * gameState.dpr);
      canvas.height = Math.round(rect.height * gameState.dpr);
      ctx.setTransform(gameState.dpr, 0, 0, gameState.dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      gameState.hamster.size = gameState.width < 600 ? 54 : 64;
      resetHamsterPosition();
      drawScene();
    }

    function handlePress() {
      if (gameState.screen === "playing") {
        gameState.input.holding = true;
      }
    }

    function handleRelease() {
      gameState.input.holding = false;
    }

    function updateHoveredButton(point) {
      const button = buttonAtPoint(point.x, point.y);
      gameState.hoverButtonId = button ? button.id : "";
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      const point = canvasPointFromEvent(event);
      const button = buttonAtPoint(point.x, point.y);

      if (button) {
        updateHoveredButton(point);
        handleUiAction(button);
        return;
      }

      if (gameState.screen === "playing") {
        handlePress();
        return;
      }

      updateHoveredButton(point);
    });

    canvas.addEventListener("pointermove", (event) => {
      updateHoveredButton(canvasPointFromEvent(event));
    });

    canvas.addEventListener("pointerleave", () => {
      gameState.hoverButtonId = "";
      handleRelease();
    });

    window.addEventListener("pointerup", handleRelease);
    window.addEventListener("pointercancel", handleRelease);

    window.addEventListener("keydown", (event) => {
      if (event.code === "Escape") {
        event.preventDefault();
        if (gameState.screen === "playing") {
          showPauseScreen();
        } else if (gameState.screen === "paused") {
          resumeGame();
        }
        return;
      }

      if (event.code !== "Space") {
        return;
      }

      event.preventDefault();

      if (gameState.screen === "start") {
        startGame(false);
      }

      if (gameState.screen === "playing") {
        gameState.input.holding = true;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        handleRelease();
      }
    });

    window.addEventListener("blur", () => {
      gameState.hoverButtonId = "";
      handleRelease();
    });
    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
